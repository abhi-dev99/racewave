name: f1_strategy_app
description: F1 Strategy Simulator and Driver Analyzer

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP requests for F1 API
  http: ^1.1.0
  
  # Internationalization
  intl: ^0.19.0
  
  # State management
  provider: ^6.1.1
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # JSON handling
  json_annotation: ^4.8.1
  
  # UI enhancements
  cached_network_image: ^3.3.0
  
  # Typography - Google Fonts
  google_fonts: ^8.0.2
  
  # Animations & Graphics
  lottie: ^3.1.0
  rive: ^0.13.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  glassmorphism: ^3.0.0
  
  # Charts & Data Visualization
  fl_chart: ^0.69.0
  syncfusion_flutter_charts: ^26.2.11
  
  # Custom Painters & Effects
  flutter_staggered_animations: ^1.1.1
  animated_text_kit: ^4.2.2
  particles_flutter: ^0.1.4
  
  # Icons & Graphics
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/flags/
